# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"
silent: true

vars:
  PY_BOOT: python
  PY: "{{.TASKFILE_DIR}}/.venv/bin/python"

includes:
  docker:
    taskfile: ./tasks/Taskfile.docker.yml
    optional: true
  github:
    taskfile: ./tasks/Taskfile.github.yml
    optional: true
  python:
    taskfile: ./tasks/Taskfile.python.yml
    optional: true
  mcp:
    taskfile: ./tasks/Taskfile.mcp.yml
    optional: true

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Create .venv and editable install with dev extras (pytest, ruff, mcp)
    cmds:
      - "{{.PY_BOOT}} -m venv .venv"
      - "{{.PY}} -m pip install -U pip"
      - "{{.PY}} -m pip install -e '.[dev]'"

  test:
    desc: Run pytest (requires task install first)
    cmds:
      - "{{.PY}} -m pytest tests/ -v"

  lint:
    desc: Ruff check (requires task install first)
    cmds:
      - "{{.PY}} -m ruff check src tests"

  format:
    desc: Ruff format write (requires task install first)
    cmds:
      - "{{.PY}} -m ruff format src tests"

  ci:
    desc: Lint then test (sequential)
    cmds:
      - task lint
      - task test

  validate-fixture:
    desc: Validate the minimal example pack via the Typer app
    cmds:
      - "{{.PY}} -m kgx.cli.main validate examples/fixtures/minimal.kgpack"

  spike:
    desc: AWS docs ingestion spike (network; writes build/aws-core.kgpack)
    cmds:
      - "{{.PY}} scripts/aws_docs_spike.py"

  confluence-pack:
    desc: Build kgpack from a Confluence Markdown export tree (override EXPORT_DIR)
    vars:
      EXPORT_DIR: '{{default "examples/fixtures/confluence-export-sample" .EXPORT_DIR}}'
    cmds:
      - "{{.PY}} scripts/confluence_export_to_pack.py {{.EXPORT_DIR}} -o build/confluence-export.kgpack"
